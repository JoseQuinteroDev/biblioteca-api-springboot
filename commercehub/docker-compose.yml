version: '3.9'

services:
  mysql-auth:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db
    ports: ["3307:3306"]
    volumes:
      - ./docker/mysql/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql-catalog:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: catalog_db
    ports: ["3308:3306"]
    volumes:
      - ./docker/mysql/catalog/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql-order:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: order_db
    ports: ["3309:3306"]
    volumes:
      - ./docker/mysql/order/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  discovery-service:
    build: ./services/discovery-service
    ports: ["8761:8761"]

  config-server:
    build: ./services/config-server
    ports: ["8888:8888"]

  api-gateway:
    build: ./services/api-gateway
    ports: ["8080:8080"]
    depends_on: [discovery-service, config-server]

  auth-service:
    build: ./services/auth-service
    depends_on: [mysql-auth, discovery-service, config-server]

  catalog-service:
    build: ./services/catalog-service
    depends_on: [mysql-catalog, discovery-service, config-server]

  order-service:
    build: ./services/order-service
    depends_on: [mysql-order, discovery-service, config-server]
