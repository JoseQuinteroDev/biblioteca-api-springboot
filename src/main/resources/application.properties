spring.application.name=BibliotecaApplication
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/biblioteca_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}

security.jwt.secret=${JWT_SECRET:my-super-secure-jwt-secret-key-with-32-plus-chars}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
